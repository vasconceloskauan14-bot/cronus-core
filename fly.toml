app = "cronus-agent"
primary_region = "gru"

[env]
  PORT = "8787"
  OBSIDIAN_AI_PORT = "8787"
  OBSIDIAN_AI_VAULT = "."
  OBSIDIAN_RADAR_STATE = "/data/state/obsidian_radar_state.json"
  OBSIDIAN_RADAR_CONFIG = "config/obsidian_radar.json"
  OBSIDIAN_SYNTHESIS_INTERVAL = "15"
  OBSIDIAN_NEWS_INTERVAL = "10"
  CRONUS_PROVIDER = "groq"
  OBSIDIAN_AI_PROVIDER = "groq"
  OBSIDIAN_AI_MODEL = "llama-3.3-70b-versatile"
  GIT_USER_NAME = "CRONUS Bot"
  GIT_USER_EMAIL = "cronus@auto.bot"
  GIT_SYNC_INTERVAL_MINUTES = "30"
  EVENT_FORECASTER_ENABLED = "true"

[http_service]
  internal_port = 8787
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "cronus_state"
  destination = "/data"
